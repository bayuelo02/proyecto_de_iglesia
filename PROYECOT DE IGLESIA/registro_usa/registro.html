<!DOCTYPE html>
<html lang="es">
    <meta charset="UTF-8">

    <link rel="stylesheet" href="estilos.css">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>
</head>
<body>
<div class="container">
    <form action="registro.php" method="POST">

        <h2>Crear Cuenta</h2>

        <input
            type="text"
            name="nombre"
            placeholder="Nombre"
            required
        >

        <input
            type="email"
            name="correo"
            placeholder="Correo"
            required
        >

        <input
            type="text"
            name="usuario"
            placeholder="Usuario"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required
        >

        <button type="submit">
            Registrarse
        </button>
</div>

</body>

</html>
